function saveEmployee() {
  const name = document.getElementById('empName').value.trim();
  const position = document.getElementById('empPosition').value;
  const startTime = document.getElementById('empStartTime').value;
  const endTime = document.getElementById('empEndTime').value;
  const hireDate = document.getElementById('empHireDate').value;
  const phone = document.getElementById('empPhone').value.trim();
  const floor = document.getElementById('empFloor').value;
  const memo = document.getElementById('empMemo').value.trim();
  const editId = document.getElementById('empEditId').value;

  if (!name) { alert('이름을 입력해주세요.'); return; }
  if (!startTime || !endTime) { alert('근무 시간을 입력해주세요.'); return; }

  if (editId) {
    const emp = appData.employees.find(e => e.id === parseInt(editId));
    if (emp) {
      emp.name = name;
      emp.position = position;
      emp.floor = floor;
      emp.startTime = startTime;
      emp.endTime = endTime;
      emp.hireDate = hireDate;
      emp.phone = phone;
      emp.memo = memo;
      emp.updatedAt = new Date().toISOString();
    }
  } else {
    const maxOrder = appData.employees.length > 0
      ? Math.max(...appData.employees.map(e => e.order)) : 0;
    appData.employees.push({
      id: appData.nextId++,
      name, position, floor, startTime, endTime,
      hireDate, resignDate: '', phone, memo,
      active: true,
      order: maxOrder + 1,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    });
  }

  saveData();
  resetEmpForm();
  renderEmployeeList();
}

function moveEmployee(id, direction) {
  const active = appData.employees.filter(e => e.active).sort((a, b) => a.order - b.order);
  const idx = active.findIndex(e => e.id === id);
  if (idx < 0) return;
  const swapIdx = idx + direction;
  if (swapIdx < 0 || swapIdx >= active.length) return;
  const tmpOrder = active[idx].order;
  active[idx].order = active[swapIdx].order;
  active[swapIdx].order = tmpOrder;
  saveData();
  renderEmployeeList();
}

// ===== Tab 3: Analytics =====
function updateAnalytics() {
  const period = document.getElementById('analyticsPeriod').value;
  const baseMonth = document.getElementById('analyticsMonth').value;
  const posFilter = document.getElementById('analyticsPosition').value;
  if (!baseMonth) return;

  const [baseY, baseM] = baseMonth.split('-').map(Number);
  let months = [];

  if (period === 'month') {
    months = [baseMonth];
  } else if (period === 'quarter') {
    const qStart = Math.floor((baseM - 1) / 3) * 3 + 1;
    for (let i = 0; i < 3; i++) {
      months.push(baseY + '-' + String(qStart + i).padStart(2, '0'));
    }
  } else {
    for (let i = 1; i <= 12; i++) {
      months.push(baseY + '-' + String(i).padStart(2, '0'));
    }
  }

  const employees = appData.employees
    .filter(e => e.active && (posFilter === 'all' || e.position === posFilter))
    .sort((a, b) => a.order - b.order);

  // Calculate stats
  const stats = employees.map(emp => {
    let workDays = 0, leaveDays = 0, halfDays = 0, sickDays = 0;
    let officialDays = 0, eduDays = 0, longLeave = 0, familyDays = 0;
    let satWork = 0, absentDays = 0, totalMinutes = 0;

    months.forEach(ym => {
      const days = getDaysInMonth(ym);
      for (let d = 1; d <= days; d++) {
        const dow = getDayOfWeek(ym, d);
        const holiday = isHoliday(ym, d);
        const att = getAttendance(ym, emp.id, d);

        if (att) {
          switch (att.type) {
            case 'work':
              workDays++;
              if (dow === 6) satWork++;
              if (att.start && att.end) {
                const [sh, sm] = att.start.split(':').map(Number);
                const [eh, em] = att.end.split(':').map(Number);
                totalMinutes += (eh * 60 + em) - (sh * 60 + sm);
              }
              break;
            case '연차': leaveDays++; break;
            case '반차오전': case '반차오후': halfDays++; totalMinutes += 4 * 60; break;
            case '병가': sickDays++; break;
            case '공가': officialDays++; break;
            case '교육': eduDays++; break;
            case '휴직': longLeave++; break;
            case '경조': familyDays++; break;
          }
        } else if (dow >= 1 && dow <= 5 && !holiday) {
          // Weekday, no holiday, no record = absent
          // But only count if employee was hired
          const ymDate = new Date(parseInt(ym.split('-')[0]), parseInt(ym.split('-')[1]) - 1, d);
          if (emp.hireDate && new Date(emp.hireDate) > ymDate) continue;
          if (emp.resignDate && new Date(emp.resignDate) < ymDate) continue;
          absentDays++;
        }
      }
    });

    const totalHours = Math.round(totalMinutes / 60 * 10) / 10;
    return { emp, workDays, leaveDays, halfDays, sickDays, officialDays, eduDays, longLeave, familyDays, satWork, absentDays, totalHours };
  });

  // Summary cards
  const totalWork = stats.reduce((s, r) => s + r.workDays, 0);
  const totalLeave = stats.reduce((s, r) => s + r.leaveDays, 0);
  const totalAbsent = stats.reduce((s, r) => s + r.absentDays, 0);
  const avgWork = employees.length > 0 ? Math.round(totalWork / employees.length * 10) / 10 : 0;

  document.getElementById('summaryCards').innerHTML = `
    <div class="summary-card"><div class="value">${employees.length}</div><div class="label">전체 직원</div></div>
    <div class="summary-card"><div class="value">${avgWork}</div><div class="label">평균 근무일</div></div>
    <div class="summary-card"><div class="value">${totalLeave}</div><div class="label">총 연차 사용</div></div>

function renderDutyFairness(months) {
  const fixedNames = ['이길순', '김현숙', '한은경'];
  const EXCEPTION_DAYS_MAP = { '2026-03': [3] }; // 예외일 (오리엔테이션 등)
  const EARLY_RULE = 2; // 하루 조기출근 고정 인원

  const employees = appData.employees
    .filter(e => e.active && !fixedNames.includes(e.name))
    .sort((a, b) => a.order - b.order);

  if (employees.length === 0) {
    document.getElementById('dutyFairnessChart').innerHTML = '';
    document.getElementById('dutyFairnessWarnings').innerHTML = '';
    document.getElementById('dutyFairnessPredChart').style.display = 'none';
    return;
  }

  const warnings = [];

  // ── 실제 데이터 집계 ──
  const dutyStats = employees.map(emp => {
    let am = 0, early = 0, pm = 0;
    months.forEach(ym => {
      const exDays = EXCEPTION_DAYS_MAP[ym] || [];
      const days = getDaysInMonth(ym);
      for (let d = 1; d <= days; d++) {
        const dow = getDayOfWeek(ym, d);
        if (dow === 0 || dow === 6) continue;
        if (isHoliday(ym, d)) continue;
        const att = getAttendance(ym, emp.id, d);
        if (!att || att.type !== 'work') continue;
        const duty = getDutyType(att, emp.position);
        if (!duty) continue;
        if (exDays.includes(d) && duty === '조기') continue;
        if (duty === '오전') am++;
        else if (duty === '조기') early++;
        else if (duty === '오후') pm++;
      }
    });
    return { emp, am, early, pm, total: am + early + pm };
  });

  // 하루 조기출근 규칙 위반 체크
  months.forEach(ym => {
    const exDays = EXCEPTION_DAYS_MAP[ym] || [];
    const days = getDaysInMonth(ym);
    for (let d = 1; d <= days; d++) {
      const dow = getDayOfWeek(ym, d);
      if (dow === 0 || dow === 6) continue;
      if (isHoliday(ym, d)) continue;
      if (exDays.includes(d)) continue;
      let earlyOnDay = 0;
      employees.forEach(emp => {
        const att = getAttendance(ym, emp.id, d);
        if (att && att.type === 'work' && getDutyType(att, emp.position) === '조기') earlyOnDay++;
      });
      if (earlyOnDay > 0 && earlyOnDay !== EARLY_RULE) {
        const m = parseInt(ym.split('-')[1]);
        warnings.push(`${m}/${d}일: 조기출근 ${earlyOnDay}명 (규칙: ${EARLY_RULE}명)`);
      }
    }
  });

  // 예외일 안내
  months.forEach(ym => {
    const exDays = EXCEPTION_DAYS_MAP[ym] || [];
    if (exDays.length > 0) {
      const m = parseInt(ym.split('-')[1]);
      warnings.unshift(`${m}/${exDays.join(',')}일은 예외일(오리엔테이션 등)로 조기출근 집계에서 제외`);
    }
  });

  // 실제 차트 렌더
  const monthLabel = months.map(m => parseInt(m.split('-')[1]) + '월').join(', ');
  document.getElementById('dutyFairnessChart').innerHTML = buildFairnessChart(dutyStats, monthLabel + ' 실제', '#7B61FF');

  // 경고 렌더
  if (warnings.length > 0) {
    let warnHtml = '';
    warnings.forEach(w => {
      const isInfo = w.includes('예외일');
      warnHtml += `<div style="display:flex;align-items:flex-start;gap:6px;padding:6px 10px;margin-bottom:4px;border-radius:8px;font-size:12px;background:${isInfo ? 'var(--md-tertiary-container)' : 'var(--md-error-container)'};color:${isInfo ? 'var(--md-on-tertiary-container)' : 'var(--md-on-error-container)'};">
        <span>${isInfo ? 'ℹ' : '⚠'}</span>
        <span>${escapeHtml(w)}</span>
      </div>`;
    });
    document.getElementById('dutyFairnessWarnings').innerHTML = warnHtml;
  } else {
    document.getElementById('dutyFairnessWarnings').innerHTML = '';
  }

  // ── 예측 데이터 (분리 차트) ──
  const includePred = document.getElementById('includePrediction') && document.getElementById('includePrediction').checked;
  const predChartEl = document.getElementById('dutyFairnessPredChart');

  if (!includePred) {
    predChartEl.style.display = 'none';
    return;
  }

  // 다음달 계산
  const lastM = months[months.length - 1];
  const [ly, lm] = lastM.split('-').map(Number);
  const predMonth = (lm === 12 ? ly + 1 : ly) + '-' + String(lm === 12 ? 1 : lm + 1).padStart(2, '0');

  // 예측 생성 (없으면)
  if (!appData.predictions || !appData.predictions[predMonth]) {
    generatePrediction(predMonth);
  }

  const predStats = employees.map(emp => {
    let am = 0, early = 0, pm = 0;
    const days = getDaysInMonth(predMonth);
    for (let d = 1; d <= days; d++) {
      const dow = getDayOfWeek(predMonth, d);
      if (dow === 0 || dow === 6) continue;
      if (isHoliday(predMonth, d)) continue;
      const pred = getPrediction(predMonth, emp.id, d);
      if (!pred || pred.type !== 'work') continue;
      const duty = getDutyType(pred, emp.position);
      if (duty === '오전') am++;
      else if (duty === '조기') early++;
      else if (duty === '오후') pm++;
    }
    return { emp, am, early, pm, total: am + early + pm };
  });

  const predLabel = parseInt(predMonth.split('-')[1]) + '월 예측';
  predChartEl.style.display = 'block';
  predChartEl.innerHTML = `<div style="border-top:1px dashed var(--md-outline-variant);padding-top:16px;">` +
    buildFairnessChart(predStats, predLabel, '#4A80C4') + `</div>`;
}

function buildFairnessChart(stats, title, accentColor) {
  const sorted = stats.slice().sort((a, b) => b.total - a.total);
  const count = stats.length;
  const avg = stats.reduce((s, d) => s + d.total, 0) / count;
  const maxCount = Math.max(...stats.map(d => d.total), 1);
  const avgPos = Math.round(avg / maxCount * 100);

  let html = `<div style="margin-bottom:8px;font-size:12px;color:var(--md-on-surface-variant);">${title} · 평균 <strong>${avg.toFixed(1)}</strong>회</div>`;
  html += '<div style="display:flex;flex-direction:column;gap:8px;">';

  sorted.forEach((d, i) => {
    const barW = Math.round(d.total / maxCount * 100);
    const dev = d.total - avg;
    let barColor, devLabel;
    if (dev > 0) { barColor = '#C47A9A'; devLabel = '많음'; }
    else if (dev < 0) { barColor = '#7A9AC4'; devLabel = '적음'; }
    else { barColor = '#8DB89E'; devLabel = ''; }

    html += `<div style="display:flex;align-items:center;gap:10px;">
      <div style="width:70px;text-align:right;font-size:13px;font-weight:500;"><span style="color:var(--md-on-surface-variant);font-size:11px;">${i+1}.</span> ${escapeHtml(d.emp.name)}</div>
      <div style="width:140px;min-width:140px;position:relative;height:26px;background:var(--md-surface-container);border-radius:6px;overflow:hidden;">
        <div style="width:${barW}%;height:100%;background:${barColor};border-radius:6px;transition:width 0.3s;"></div>
        <div style="position:absolute;left:${avgPos}%;top:0;bottom:0;width:2px;background:var(--md-on-surface);opacity:0.25;"></div>
      </div>
      <div style="width:30px;font-size:14px;font-weight:700;">${d.total}</div>
      <div style="font-size:12px;color:var(--md-on-surface-variant);white-space:nowrap;">07:30 <strong>${d.am}</strong> · 08:00 <strong>${d.early}</strong> · 10:00 <strong>${d.pm}</strong></div>
      <div style="width:32px;font-size:11px;font-weight:600;color:${barColor};">${devLabel}</div>
    </div>`;
  });

  // 평균 행
  const avgAm = stats.reduce((s, d) => s + d.am, 0) / count;
  const avgEarly = stats.reduce((s, d) => s + d.early, 0) / count;
  const avgPm = stats.reduce((s, d) => s + d.pm, 0) / count;

  html += `<div style="display:flex;align-items:center;gap:10px;margin-top:4px;padding-top:8px;border-top:1px solid var(--md-outline-variant);">
    <div style="width:70px;text-align:right;font-size:13px;font-weight:600;color:var(--md-on-surface-variant);">평균</div>
    <div style="width:140px;min-width:140px;"></div>
    <div style="width:30px;font-size:14px;font-weight:700;">${(stats.reduce((s,d)=>s+d.total,0)/count).toFixed(1)}</div>
    <div style="font-size:12px;color:var(--md-on-surface-variant);white-space:nowrap;">07:30 <strong>${avgAm.toFixed(1)}</strong> · 08:00 <strong>${avgEarly.toFixed(1)}</strong> · 10:00 <strong>${avgPm.toFixed(1)}</strong></div>
  </div>`;

  html += '</div>';
  return html;
}

function exportBackup() {
  const data = JSON.parse(JSON.stringify(appData));
  data.exportDate = new Date().toISOString();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const ts = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + '_' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0');
  a.download = `attendance_backup_${ts}.json`;
  a.click();
  URL.revokeObjectURL(url);

  appData.settings.lastBackupDate = new Date().toISOString();
  saveData();
  renderBackupInfo();
}

function importBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!confirm('현재 데이터를 가져온 파일의 데이터로 교체합니다.\n계속하시겠습니까?\n(현재 데이터는 자동 백업됩니다)')) {
    event.target.value = '';
    return;
  }

  // Auto-backup before import
  const autoBackup = JSON.stringify(appData);
  localStorage.setItem(STORAGE_KEY + '_pre_import_backup', autoBackup);

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      // Validate
      if (!imported.employees || !Array.isArray(imported.employees)) {
        throw new Error('유효하지 않은 백업 파일입니다.');
      }
      if (!imported.attendance || typeof imported.attendance !== 'object') {
        throw new Error('출근 데이터가 없습니다.');
      }
      // Sanitize strings
      imported.employees.forEach(emp => {
        emp.name = String(emp.name || '').slice(0, 50);
        emp.phone = String(emp.phone || '').slice(0, 20);
        emp.memo = String(emp.memo || '').slice(0, 200);
      });
      appData = imported;
      if (!appData.holidays) appData.holidays = JSON.parse(JSON.stringify(DEFAULT_HOLIDAYS));
      if (!appData.settings) appData.settings = {};
      if (!appData.nextId) appData.nextId = Math.max(0, ...appData.employees.map(e => e.id)) + 1;
      saveData();
      alert('데이터를 성공적으로 가져왔습니다.');
      renderAttendance();
    } catch (err) {
      alert('가져오기 실패: ' + err.message);
      // Restore
      appData = JSON.parse(autoBackup);
      saveData();
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function resetAllData() {
  if (!confirm('모든 데이터(직원, 출근기록, 설정)를 초기화합니다.\n정말 진행하시겠습니까?')) return;
  if (!confirm('되돌릴 수 없습니다. 최종 확인합니다.')) return;
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(STORAGE_KEY + '_pre_import_backup');
  location.reload();
}

function renderBackupInfo() {
  const lastBackup = appData.settings.lastBackupDate;
  const infoEl = document.getElementById('backupInfo');
  const warnEl = document.getElementById('backupWarning');

  if (lastBackup) {
    const d = new Date(lastBackup);
    const diff = Math.floor((Date.now() - d.getTime()) / (1000 * 60 * 60 * 24));
    infoEl.textContent = `마지막 백업: ${d.toLocaleDateString('ko-KR')} (${diff}일 전)`;
    if (diff >= 7) {
      warnEl.style.display = 'block';
      warnEl.textContent = `마지막 백업이 ${diff}일 전입니다. 데이터를 백업해주세요.`;
    } else {
      warnEl.style.display = 'none';
    }
  } else {
    infoEl.textContent = '마지막 백업: 없음';
    warnEl.style.display = 'block';
    warnEl.textContent = '아직 백업한 적이 없습니다. 데이터 손실 방지를 위해 백업해주세요.';
  }
}

function loadHolidayYear() {
  renderHolidays();
}

function addHoliday() {
  const year = document.getElementById('holidayYearInput').value;
  const date = prompt('날짜를 입력하세요 (MM-DD 형식, 예: 03-01)');
  if (!date || !/^\d{2}-\d{2}$/.test(date)) { alert('올바른 형식으로 입력해주세요 (MM-DD)'); return; }
  const name = prompt('공휴일 이름을 입력하세요');
  if (!name) return;
  if (!appData.holidays[year]) appData.holidays[year] = {};
  appData.holidays[year][date] = name;
  saveData();
  renderHolidays();
}

function removeHoliday(year, date) {
  if (!confirm(`${date} 공휴일을 삭제하시겠습니까?`)) return;
  if (appData.holidays[year]) {
    delete appData.holidays[year][date];
    saveData();
    renderHolidays();
  }
}

function resetDefaultHolidays() {
  const year = document.getElementById('holidayYearInput').value;
  if (!DEFAULT_HOLIDAYS[year]) {
    alert(`${year}년의 기본 공휴일 데이터가 없습니다.`);
    return;
  }
  if (!confirm(`${year}년 공휴일을 기본값으로 초기화하시겠습니까?`)) return;
  appData.holidays[year] = JSON.parse(JSON.stringify(DEFAULT_HOLIDAYS[year]));
  saveData();
  renderHolidays();
}

// ===== Print =====
function printAttendance() {
  document.getElementById('tab-attendance').classList.add('print-target');
  const isCalendar = document.getElementById('viewMode').value === 'calendar';
  const viewMode = document.getElementById('viewMode').value;
  let pageStyle = null;
  if (isCalendar) {
    const ym = getYearMonth();
    const [y, m] = ym.split('-').map(Number);
    const firstDow = new Date(y, m - 1, 1).getDay();
    const days = new Date(y, m, 0).getDate();
    const weekRows = Math.ceil((firstDow + days) / 7);
    document.documentElement.style.setProperty('--cal-print-weeks', weekRows);
    document.body.classList.add('print-calendar');
    pageStyle = document.createElement('style');
    pageStyle.id = 'print-page-landscape';
    pageStyle.textContent = '@media print { @page { size: A4 landscape; margin: 3mm; } }';
    document.head.appendChild(pageStyle);
  }
  // 기존보기: 테이블 너비에 맞게 축소
  if (viewMode === 'classic') {
    const table = document.getElementById('attendanceTable');
    if (table) {
      const pageWidth = 297 - 6; // A4 가로 mm - 여백
      const pageWidthPx = pageWidth * 3.78; // mm to px (approx)
      const tableWidth = table.scrollWidth;
      const scale = tableWidth > pageWidthPx ? pageWidthPx / tableWidth : 1;
      document.documentElement.style.setProperty('--print-scale', scale.toFixed(3));
    }
  }
  setTimeout(() => {
    window.print();
    if (isCalendar) {
      document.body.classList.remove('print-calendar');
      if (pageStyle) pageStyle.remove();
    }
    if (viewMode === 'classic') {
      document.documentElement.style.removeProperty('--print-scale');
    }
  }, 100);
}

// 고정: 이길순(원장 08:00), 김현숙(보조 10:30), 한은경(조리 08:30)
// 일별 구조 (7명 순환): 07:30×1 + 10:00×1 + 08:00×2 + 09:00×3
// 블록 단위: 3일 연속 → 다음 사람으로 교대
// 예외: 3/3 오리엔테이션 (08:00 다수 출근)
const FIXED_EMPS = { '이길순': '08:00', '김현숙': '10:30', '한은경': '08:30' };
const DUTY_BLOCK_LEN = 3;
const EARLY_PER_DAY = 2; // 08:00 조기출근 고정 인원

function analyzeMarchPatterns() {
  const ym = '2026-03';
  const att = appData.attendance[ym];
  if (!att) return null;

  const employees = getActiveEmployees();

  // 3월 평일 리스트 (3/3 오리엔테이션 예외일 제외하여 패턴 추출)
  const EXCEPTION_DAYS = [3]; // 오리엔테이션 등 예외일
  const marchWorkdays = [];
  for (let d = 1; d <= 31; d++) {
    const dow = new Date(2026, 2, d).getDay();
    if (dow === 0 || dow === 6) continue;
    if (isHoliday(ym, d)) continue;
    marchWorkdays.push(d);
  }

  // 직원별 일별 출근시간 수집
  const empDailyTimes = {};
  employees.forEach(emp => {
    if (FIXED_EMPS[emp.name]) return;
    const eid = String(emp.id);
    if (!att[eid]) return;
    empDailyTimes[emp.name] = {};
    marchWorkdays.forEach(d => {
      const dayAtt = att[eid][d];
      if (dayAtt && dayAtt.type === 'work') {
        empDailyTimes[emp.name][d] = dayAtt.start;
      }
    });
  });

  // 일별 오전당직, 오후당직 담당자 맵 (예외일 제외)
  const dt = appData.settings.dutyTimes || DEFAULT_DUTY_TIMES;
  const amTime = dt['오전'].start;
  // 3월 데이터는 10:00으로 기록되어 있으므로 패턴 분석 시 10:00도 오후로 인식
  const pmTimeCurrent = dt['오후'].start;
  const pmTimeLegacy = '10:00';
  const dailyAm = {};
  const dailyPm = {};
  marchWorkdays.forEach(d => {
    if (EXCEPTION_DAYS.includes(d)) return;
    Object.entries(empDailyTimes).forEach(([name, days]) => {
      if (days[d] === amTime || days[d] === '07:30') dailyAm[d] = name;
      if (days[d] === pmTimeCurrent || days[d] === pmTimeLegacy) dailyPm[d] = name;
    });
  });

  // 연속 블록 추출
  function buildBlocks(dailyMap) {
    const blocks = [];
    let last = null;
    const sortedDays = Object.keys(dailyMap).map(Number).sort((a, b) => a - b);
    sortedDays.forEach(d => {
      const name = dailyMap[d];
      if (last && last.name === name) {
        last.endDay = d; last.count++;
      } else {
        last = { name, startDay: d, endDay: d, count: 1 };
        blocks.push(last);
      }
    });
    return blocks;
  }

  const amBlocks = buildBlocks(dailyAm);
  const pmBlocks = buildBlocks(dailyPm);

  // 블록 순서에서 순환 순서 추출 (등장 순)
  function deriveOrder(blocks) {
    const order = [];
    blocks.forEach(b => { if (!order.includes(b.name)) order.push(b.name); });
    return order;
  }

  const amOrder = deriveOrder(amBlocks);
  const pmOrder = deriveOrder(pmBlocks);

  // 3월 말 마지막 블록 위치 → 4월 시작점
  const lastAmBlock = amBlocks[amBlocks.length - 1];
  const lastPmBlock = pmBlocks[pmBlocks.length - 1];

  const amCarryOver = lastAmBlock && lastAmBlock.count < DUTY_BLOCK_LEN
    ? { name: lastAmBlock.name, remaining: DUTY_BLOCK_LEN - lastAmBlock.count } : null;
  const pmCarryOver = lastPmBlock && lastPmBlock.count < DUTY_BLOCK_LEN
    ? { name: lastPmBlock.name, remaining: DUTY_BLOCK_LEN - lastPmBlock.count } : null;

  const amNextIdx = amCarryOver
    ? amOrder.indexOf(amCarryOver.name)
    : (amOrder.indexOf(lastAmBlock?.name || '') + 1) % amOrder.length;
  const pmNextIdx = pmCarryOver
    ? pmOrder.indexOf(pmCarryOver.name)
    : (pmOrder.indexOf(lastPmBlock?.name || '') + 1) % pmOrder.length;

  // 각 직원의 3월 말 상태 (마지막 연속 시간)
  const empEndState = {};
  Object.entries(empDailyTimes).forEach(([name, days]) => {
    const sortedDays = Object.keys(days).map(Number).sort((a, b) => a - b);
    if (sortedDays.length === 0) return;
    const lastDay = sortedDays[sortedDays.length - 1];
    const lastTime = days[lastDay];
    let count = 0;
    for (let i = sortedDays.length - 1; i >= 0; i--) {
      if (days[sortedDays[i]] === lastTime) count++;
      else break;
    }
    empEndState[name] = { lastTime, consecutiveDays: count };
  });

  return {
    amOrder, pmOrder, amBlocks, pmBlocks,
    amCarryOver, pmCarryOver, amNextIdx, pmNextIdx,
    empDailyTimes, empEndState, marchWorkdays
  };
}

function getTimeEndMap() {
  const dt = appData.settings.dutyTimes || DEFAULT_DUTY_TIMES;
  const map = {
    '08:30': '17:30', '09:00': '18:00', '10:30': '19:30'
  };
  map[dt['오전'].start] = dt['오전'].end;
  map[dt['조기'].start] = dt['조기'].end;
  map[dt['오후'].start] = dt['오후'].end;
  return map;
}

function generatePrediction(targetYm) {
  const patterns = analyzeMarchPatterns();
  if (!patterns) return;

  const { amOrder, pmOrder, amCarryOver, pmCarryOver, amNextIdx, pmNextIdx, empEndState } = patterns;
  const [year, month] = targetYm.split('-').map(Number);
  const daysInMonth = new Date(year, month, 0).getDate();
  const employees = getActiveEmployees();
  const predictions = {};
  const timeEndMap = getTimeEndMap();

  // 고정 직원
  employees.forEach(emp => {
    if (FIXED_EMPS[emp.name]) {
      const eid = String(emp.id);
      predictions[eid] = {};
      for (let d = 1; d <= daysInMonth; d++) {
        const dow = new Date(year, month - 1, d).getDay();
        if (dow === 0 || dow === 6) continue;
        if (isHoliday(targetYm, d)) continue;
        const start = FIXED_EMPS[emp.name];
        predictions[eid][d] = { type: 'work', start, end: timeEndMap[start] || '17:00' };
      }
    }
  });

  // 평일 리스트
  const workdays = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = new Date(year, month - 1, d).getDay();
    if (dow === 0 || dow === 6) continue;
    if (isHoliday(targetYm, d)) continue;
    workdays.push(d);
  }

  const rotatingNames = employees.filter(e => !FIXED_EMPS[e.name]).map(e => e.name);

  // ── Phase 1: 07:30, 10:00 당직 배정 (3일 블록 순환) ──
  function assignDutyRotation(order, nextIdx, carryOver) {
    const assign = {};
    let idx = nextIdx;
    let remain = carryOver ? carryOver.remaining : 0;
    let cur = carryOver ? carryOver.name : order[idx % order.length];
    let cnt = 0;
    workdays.forEach(d => {
      if (remain > 0) {
        assign[d] = cur; remain--;
        if (remain === 0) { idx = (order.indexOf(cur) + 1) % order.length; cur = order[idx]; cnt = 0; }
      } else {
        if (cnt >= DUTY_BLOCK_LEN) { idx = (idx + 1) % order.length; cur = order[idx]; cnt = 0; }
        assign[d] = cur; cnt++;
      }
    });
    return assign;
  }

  const amAssign = assignDutyRotation(amOrder, amNextIdx, amCarryOver);
  const pmAssign = assignDutyRotation(pmOrder, pmNextIdx, pmCarryOver);

  // 오전+오후 충돌 해소
  workdays.forEach(d => {
    if (amAssign[d] && pmAssign[d] && amAssign[d] === pmAssign[d]) {
      const ci = pmOrder.indexOf(pmAssign[d]);
      for (let i = 1; i < pmOrder.length; i++) {
        const c = pmOrder[(ci + i) % pmOrder.length];
        if (c !== amAssign[d]) { pmAssign[d] = c; break; }
      }
    }
  });

  // ── Phase 2: 08:00 조기출근 배정 (하루 정확히 2명) ──
  // 당직 블록 종료 후 3일간 08:00 전환 → "wants early" 표시
  const earlyWants = {}; // day -> Set<name>
  workdays.forEach(d => { earlyWants[d] = new Set(); });

  // 3월 말 상태에서 이월
  rotatingNames.forEach(name => {
    const st = empEndState[name];
    if (!st) return;
    let earlyDays = 0;
    const dtC = appData.settings.dutyTimes || DEFAULT_DUTY_TIMES;
    const isDutyTime = st.lastTime === dtC['오전'].start || st.lastTime === '07:30'
      || st.lastTime === dtC['오후'].start || st.lastTime === '10:00';
    const isEarlyTime = st.lastTime === dtC['조기'].start || st.lastTime === '08:00';
    if (isDutyTime) {
      if (st.consecutiveDays >= DUTY_BLOCK_LEN) earlyDays = DUTY_BLOCK_LEN;
    } else if (isEarlyTime) {
      earlyDays = Math.max(0, DUTY_BLOCK_LEN - st.consecutiveDays);
    }
    let cnt = 0;
    for (let i = 0; i < workdays.length && cnt < earlyDays; i++) {
      const d = workdays[i];
      if (amAssign[d] !== name && pmAssign[d] !== name) {
        earlyWants[d].add(name); cnt++;
      }
    }
  });

  // 월내 당직 블록 종료 → 이후 3일 08:00
  rotatingNames.forEach(name => {
    let inDuty = false;
    let blockEndIdx = -1;
    for (let i = 0; i < workdays.length; i++) {
      const d = workdays[i];
      const onDuty = amAssign[d] === name || pmAssign[d] === name;
      if (onDuty) { inDuty = true; blockEndIdx = i; }
      else if (inDuty) {
        inDuty = false;
        let cnt = 0;
        for (let j = blockEndIdx + 1; j < workdays.length && cnt < DUTY_BLOCK_LEN; j++) {
          const dd = workdays[j];
          if (amAssign[dd] !== name && pmAssign[dd] !== name) {
            earlyWants[dd].add(name); cnt++;
          }
        }
      }
    }
  });

  // 일별 정확히 EARLY_PER_DAY명 강제
  const earlyAssign = {};
  workdays.forEach(d => {
    const available = rotatingNames.filter(n => amAssign[d] !== n && pmAssign[d] !== n);
    const wants = available.filter(n => earlyWants[d].has(n));

    if (wants.length >= EARLY_PER_DAY) {
      earlyAssign[d] = wants.slice(0, EARLY_PER_DAY);
    } else {
      // 부족: 다음 당직이 가까운 사람 우선 (당직 전 전환)
      const rest = available.filter(n => !earlyWants[d].has(n));
      rest.sort((a, b) => {
        const na = nextDutyIn(a, d, workdays, amAssign, pmAssign);
        const nb = nextDutyIn(b, d, workdays, amAssign, pmAssign);
        return na - nb;
      });
      earlyAssign[d] = [...wants, ...rest.slice(0, EARLY_PER_DAY - wants.length)];
    }
  });

  // ── Phase 3: 최종 예측 생성 ──
  employees.forEach(emp => {
    if (FIXED_EMPS[emp.name]) return;
    const eid = String(emp.id);
    predictions[eid] = {};
    workdays.forEach(d => {
      let start;
      const dtP = appData.settings.dutyTimes || DEFAULT_DUTY_TIMES;
      if (amAssign[d] === emp.name) start = dtP['오전'].start;
      else if (pmAssign[d] === emp.name) start = dtP['오후'].start;
      else if (earlyAssign[d] && earlyAssign[d].includes(emp.name)) start = dtP['조기'].start;
      else start = '09:00';
      predictions[eid][d] = { type: 'work', start, end: timeEndMap[start] || '18:00' };
    });
  });

  if (!appData.predictions) appData.predictions = {};
  appData.predictions[targetYm] = {
    data: predictions,
    generatedAt: new Date().toISOString(),
    basedOn: '2026-03',
    patterns: { amOrder, pmOrder }
  };
  saveData();
  return appData.predictions[targetYm];
}

// 해당 사람의 다음 당직까지 남은 근무일 수
function nextDutyIn(name, fromDay, workdays, amAssign, pmAssign) {
  const fi = workdays.indexOf(fromDay);
  for (let i = fi + 1; i < workdays.length; i++) {
    if (amAssign[workdays[i]] === name || pmAssign[workdays[i]] === name) return i - fi;
  }
  return 999;
}

function getPrediction(ym, empId, day) {
  if (!appData.predictions || !appData.predictions[ym]) return null;
  const pred = appData.predictions[ym].data;
  if (!pred[empId]) return null;
  return pred[empId][day] || null;
}

// 예측 vs 실제 비교
function comparePrediction(ym) {
  if (!appData.predictions || !appData.predictions[ym]) return null;
  const pred = appData.predictions[ym].data;
  const actual = appData.attendance[ym] || {};

  const results = { total: 0, match: 0, mismatch: 0, noActual: 0, details: [] };

  Object.keys(pred).forEach(eid => {
    const emp = appData.employees.find(e => String(e.id) === eid);
    if (!emp) return;
    Object.keys(pred[eid]).forEach(day => {
      results.total++;
      const p = pred[eid][day];
      const a = actual[eid] && actual[eid][day];
      if (!a) {
        results.noActual++;
      } else if (a.type === 'work' && p.start === a.start) {
        results.match++;
      } else {
        results.mismatch++;
        results.details.push({
          name: emp.name, day: parseInt(day),
          predicted: p.start + '~' + p.end,
          actual: a.type === 'work' ? a.start + '~' + a.end : a.type
        });
      }
    });
  });
  results.accuracy = results.total > 0 ? Math.round((results.match / (results.match + results.mismatch)) * 100) : 0;
  return results;
}

function cleanupSaturdayData() {
  if (!appData.attendance) return;
  let changed = false;
  Object.keys(appData.attendance).forEach(ym => {
    if (!appData.attendance[ym]) return;
    const [y, m] = ym.split('-').map(Number);
    Object.keys(appData.attendance[ym]).forEach(empId => {
      if (!appData.attendance[ym][empId]) return;
      Object.keys(appData.attendance[ym][empId]).forEach(day => {
        const dow = new Date(y, m - 1, parseInt(day)).getDay();
        if (dow === 6) {
          delete appData.attendance[ym][empId][day];
          changed = true;
        }
      });
    });
  });
  if (changed) saveData();
}

function correctMarchWeek1() {
  if (appData._correctedMarchW1) return;
  const ym = '2026-03';
  if (!appData.attendance[ym]) appData.attendance[ym] = {};
  const find = name => appData.employees.find(e => e.name === name);

  // 이미지 기반 3월 1주차 (3/3화~3/6금) 정확한 근무시간
  // 3/1(일) 삼일절, 3/2(월) 대체공휴일 → 공란
  const weekData = [
    ['이길순', {
      3:{type:'work',start:'08:00',end:'17:00'}, 4:{type:'work',start:'08:00',end:'17:00'},
      5:{type:'work',start:'08:00',end:'17:00'}, 6:{type:'work',start:'08:00',end:'17:00'}
    }],
    ['김단비', {
      3:{type:'work',start:'08:00',end:'17:00'}, 4:{type:'work',start:'09:00',end:'18:00'},
      5:{type:'연차'}, 6:{type:'work',start:'10:00',end:'19:00'}
    }],
    ['서아랑', {
      3:{type:'work',start:'08:00',end:'17:00'}, 4:{type:'work',start:'08:00',end:'17:00'},
      5:{type:'work',start:'08:00',end:'17:00'}, 6:{type:'work',start:'09:00',end:'18:00'}
    }],
    ['민들래', {
      3:{type:'work',start:'07:30',end:'16:30'}, 4:{type:'work',start:'07:30',end:'16:30'},
      5:{type:'work',start:'07:30',end:'16:30'}, 6:{type:'work',start:'09:00',end:'18:00'}
    }],
    ['권나연', {
      3:{type:'work',start:'08:00',end:'17:00'}, 4:{type:'work',start:'09:00',end:'18:00'},
      5:{type:'work',start:'09:00',end:'18:00'}, 6:{type:'work',start:'08:00',end:'17:00'}
    }],
    ['김수진', {
      3:{type:'work',start:'09:00',end:'18:00'}, 4:{type:'work',start:'09:00',end:'18:00'},
      5:{type:'work',start:'09:00',end:'18:00'}, 6:{type:'work',start:'09:00',end:'18:00'}
    }],
    ['배화심', {
      3:{type:'work',start:'08:00',end:'17:00'}, 4:{type:'work',start:'10:00',end:'19:00'},
      5:{type:'work',start:'10:00',end:'19:00'}, 6:{type:'work',start:'07:30',end:'16:30'}
    }],
    ['박선영', {
      3:{type:'work',start:'08:00',end:'17:00'}, 4:{type:'work',start:'08:00',end:'17:00'},
      5:{type:'work',start:'08:00',end:'17:00'}, 6:{type:'work',start:'09:00',end:'18:00'}
    }],
    ['김현숙', {
      3:{type:'work',start:'10:30',end:'19:30'}, 4:{type:'work',start:'10:30',end:'19:30'},
      5:{type:'work',start:'10:30',end:'19:30'}, 6:{type:'work',start:'10:30',end:'19:30'}
    }],
    ['한은경', {
      3:{type:'work',start:'08:30',end:'17:30'}, 4:{type:'work',start:'08:30',end:'17:30'},
      5:{type:'work',start:'08:30',end:'17:30'}, 6:{type:'work',start:'08:30',end:'17:30'}
    }]
  ];

  weekData.forEach(([name, days]) => {
    const emp = find(name);
    if (!emp) return;
    const eid = String(emp.id);
    if (!appData.attendance[ym][eid]) appData.attendance[ym][eid] = {};
    // 1~2일 데이터 제거 (공휴일)
    delete appData.attendance[ym][eid]['1'];
    delete appData.attendance[ym][eid]['2'];
    Object.entries(days).forEach(([day, att]) => {
      appData.attendance[ym][eid][day] = att;
    });
  });

  appData._correctedMarchW1 = true;
  saveData();
}

function init() {
  initFirebase();
  loadData();
  seedInitialData();
  correctMarchWeek1();
  correctMarchWeek2();
  correctMarchWeek3();
  correctMarchWeek4();
  correctMarchWeek5();
  cleanupSaturdayData();

  // Set month picker to current month
  const now = new Date();
  const ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('monthPicker').value = ym;
  document.getElementById('analyticsMonth').value = ym;
  document.getElementById('holidayYearInput').value = now.getFullYear();

  // 시간별 색상 기본 ON → 버튼 active 동기화
  if (document.getElementById('toggleColors').checked) {
    document.getElementById('btnColors').classList.add('active');
  }
  // 나만 보기 기본 ON → 버튼 active 동기화
  const onlyMeVal = parseInt(document.getElementById('toggleOnlyMe').value) || 0;
  if (onlyMeVal > 0) {
    const btn = document.getElementById('btnOnlyMe');
    btn.classList.add('active');
    const tip = btn.querySelector('.tooltip');
    if (onlyMeVal === 1 && tip) tip.textContent = '나만 보기 (켜짐)';
  }

  updateNavTitle();
  renderAttendance();

  // Firebase 실시간 동기화 시작
  initFirebaseSync();

  // Backup warning check
  const lastBackup = appData.settings.lastBackupDate;
  if (!lastBackup || (Date.now() - new Date(lastBackup).getTime()) > 7 * 24 * 60 * 60 * 1000) {
    // Show subtle warning
  }

  // Resize: recalculate calendar row height
  let resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function() {
      if (document.getElementById('viewMode').value === 'calendar') renderAttendance();
    }, 200);
  });

  // Keyboard shortcut: 'i' to toggle "나만 보기"
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT' || e.target.isContentEditable) return;
    if (e.code === 'KeyI') {
      e.preventDefault();
      toggleOnlyMeState();
    }
  });

  // Multi-tab sync
  window.addEventListener('storage', function(e) {
    if (e.key === STORAGE_KEY) {
      if (confirm('다른 탭에서 데이터가 변경되었습니다. 새로고침하시겠습니까?')) {
        location.reload();
      }
    }
  });
}

init();
